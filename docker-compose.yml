services:
  app:
    build: .
    container_name: xhs-app
    restart: unless-stopped
    ports:
      - "8011:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - xhs-net

  postgres:
    image: postgres:16-alpine
    container_name: xhs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xhs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xhs_secure_pwd}
      POSTGRES_DB: xhs_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhs -d xhs_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xhs-net

  redis:
    image: redis:7-alpine
    container_name: xhs-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - xhs-net

volumes:
  postgres_data:
  redis_data:

networks:
  xhs-net:
    driver: bridge
