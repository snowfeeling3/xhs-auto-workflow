version: "3.8"

services:
  app:
    build: .
    container_name: xhs-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - xhs-net

  nginx:
    image: nginx:1.27-alpine
    container_name: xhs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - ./logs/nginx:/var/log/nginx
      - certbot_data:/var/www/certbot
      - certs:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - xhs-net

  postgres:
    image: postgres:16-alpine
    container_name: xhs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xhs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xhs_secure_pwd}
      POSTGRES_DB: xhs_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhs -d xhs_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xhs-net

  redis:
    image: redis:7-alpine
    container_name: xhs-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - xhs-net

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certs:

networks:
  xhs-net:
    driver: bridge
