<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}墨染 · AI 小红书爆款生成器{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* ══════════════════════════════════
           Ink Studio · 墨色画室
           色彩：墨底 × 宣纸白 × 朱砂红 × 松烟灰
           ══════════════════════════════════ */

        :root {
            --ink-black: #0A0A0C;
            --ink-deep: #0F0F13;
            --ink-surface: #15151B;
            --ink-card: #1A1A22;
            --ink-card-hover: #20202B;
            --ink-border: #252530;
            --ink-border-active: #333348;
            --paper-white: #E8E4DF;
            --paper-secondary: #9E9A93;
            --paper-muted: #5E5B56;
            --cinnabar: #D4453B;
            --cinnabar-glow: rgba(212, 69, 59, 0.15);
            --cinnabar-deep: #B8372E;
            --gold: #C4A45A;
            --gold-subtle: rgba(196, 164, 90, 0.12);
            --jade: #6B9B7A;
            --jade-subtle: rgba(107, 155, 122, 0.12);
            --radius-sm: 0.375rem;
            --radius-md: 0.625rem;
            --radius-lg: 0.875rem;
            --radius-xl: 1.125rem;
            --font-display: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", "STSong", serif;
            --font-body: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            --font-mono: "SF Mono", "Cascadia Code", "JetBrains Mono", "Fira Code", "Source Code Pro", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── 墨底基底 ── */
        body {
            font-family: var(--font-display);
            background-color: var(--ink-black);
            color: var(--paper-white);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.65;
        }

        /* 宣纸纹理叠加 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.028;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 3px),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: auto, 400px 400px;
        }

        /* 环境光 —— 上方暖红，下方微金 */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 700px;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 0%, var(--cinnabar-glow) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(196, 164, 90, 0.04) 0%, transparent 45%);
        }

        /* ── 滚动条 ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ink-border-active); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--paper-muted); }

        /* ── 选中 ── */
        ::selection { background: rgba(212, 69, 59, 0.25); color: var(--paper-white); }

        /* ── 动画关键帧 ── */
        @keyframes rise {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes appear {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes ink-spread {
            from { clip-path: inset(0 100% 0 0); }
            to   { clip-path: inset(0 0 0 0); }
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 0 var(--cinnabar-glow); }
            50%      { box-shadow: 0 0 0 12px transparent; }
        }
        @keyframes float-up {
            0%   { transform: translateY(0); opacity: 0.4; }
            100% { transform: translateY(-6px); opacity: 1; }
        }
        @keyframes shiver {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-1px); }
            75% { transform: translateX(1px); }
        }
        @keyframes stamp {
            from { transform: scale(1.15); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .ink-rise       { animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .ink-rise-s1    { animation-delay: 0.05s; }
        .ink-rise-s2    { animation-delay: 0.12s; }
        .ink-rise-s3    { animation-delay: 0.20s; }
        .ink-rise-s4    { animation-delay: 0.28s; }
        .ink-rise-s5    { animation-delay: 0.36s; }
        .ink-appear     { animation: appear 0.5s ease-out both; }

        /* ── 容器 ── */
        .container-ink {
            width: 100%;
            max-width: 46rem;
            margin: 0 auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* ── 按钮：朱砂主按钮 ── */
        .btn-cinnabar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--cinnabar);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.8rem 1.75rem;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            letter-spacing: 0.06em;
            font-family: var(--font-body);
            transition: all 0.28s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(212, 69, 59, 0.3);
        }
        .btn-cinnabar:hover {
            background: var(--cinnabar-deep);
            box-shadow: 0 6px 28px var(--cinnabar-glow), 0 2px 4px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }
        .btn-cinnabar:active {
            transform: translateY(0) scale(0.98);
            box-shadow: none;
            transition-duration: 0.06s;
        }
        .btn-cinnabar:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.2);
        }

        /* ── 按钮：素面次要按钮 ── */
        .btn-ink {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: transparent;
            color: var(--paper-secondary);
            font-weight: 500;
            font-size: 0.82rem;
            padding: 0.55rem 1.1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--ink-border);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            letter-spacing: 0.04em;
            font-family: var(--font-body);
        }
        .btn-ink:hover {
            color: var(--paper-white);
            border-color: var(--ink-border-active);
            background: rgba(255,255,255,0.02);
        }
        .btn-ink:active { transform: scale(0.98); }

        /* ── 卡片 ── */
        .ink-card {
            background: var(--ink-card);
            border: 1px solid var(--ink-border);
            border-radius: var(--radius-xl);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            position: relative;
        }
        .ink-card:hover {
            border-color: var(--ink-border-active);
            background: var(--ink-card-hover);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        /* ── 输入框 ── */
        .input-ink {
            width: 100%;
            padding: 0.9rem 1.1rem;
            background: var(--ink-deep);
            border: 1px solid var(--ink-border);
            border-radius: var(--radius-md);
            color: var(--paper-white);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.28s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.02em;
            font-family: var(--font-body);
        }
        .input-ink::placeholder {
            color: var(--paper-muted);
            font-style: italic;
            opacity: 0.65;
        }
        .input-ink:focus {
            border-color: var(--cinnabar);
            box-shadow: 0 0 0 3px var(--cinnabar-glow), 0 0 30px rgba(212,69,59,0.05);
        }
        textarea.input-ink {
            font-family: var(--font-display);
            font-style: normal;
            line-height: 1.85;
        }
        textarea.input-ink::placeholder { font-style: normal; font-family: var(--font-body); }

        /* ── 标签 ── */
        .tag-ink {
            display: inline-flex;
            align-items: center;
            padding: 0.45rem 1rem;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--ink-border);
            background: var(--ink-surface);
            color: var(--paper-secondary);
            letter-spacing: 0.04em;
            user-select: none;
            font-family: var(--font-body);
        }
        .tag-ink:hover {
            color: var(--paper-white);
            border-color: rgba(212,69,59,0.35);
            background: rgba(212,69,59,0.05);
            transform: translateY(-1px);
        }
        .tag-ink.tag-lit {
            background: var(--cinnabar);
            color: #fff;
            border-color: var(--cinnabar);
            font-weight: 600;
            box-shadow: 0 2px 12px var(--cinnabar-glow);
            animation: stamp 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .tag-ink.tag-lit:hover { background: var(--cinnabar-deep); }

        /* ── 徽章 ── */
        .seal {
            display: inline-flex;
            align-items: center;
            padding: 0.28rem 0.8rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: var(--font-body);
            gap: 0.4rem;
        }
        .seal::before {
            content: '';
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
        }
        .seal-jade       { background: var(--jade-subtle); color: var(--jade); }
        .seal-jade::before { background: var(--jade); box-shadow: 0 0 6px rgba(107,155,122,0.5); }
        .seal-gold       { background: var(--gold-subtle); color: var(--gold); }
        .seal-gold::before { background: var(--gold); box-shadow: 0 0 6px rgba(196,164,90,0.5); }
        .seal-cinnabar   { background: var(--cinnabar-glow); color: var(--cinnabar); }
        .seal-cinnabar::before { background: var(--cinnabar); box-shadow: 0 0 6px var(--cinnabar-glow); animation: breathe 2s ease-in-out infinite; }

        /* ── 内容标签 ── */
        .tag-content {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.85rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(212, 69, 59, 0.05);
            color: var(--cinnabar);
            letter-spacing: 0.03em;
            font-family: var(--font-body);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .tag-content:hover {
            background: var(--cinnabar-glow);
            border-color: rgba(212,69,59,0.18);
        }

        /* ── 分隔线 ── */
        .hr-ink {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--ink-border) 20%, var(--ink-border) 80%, transparent);
        }

        /* ── 段落标题 ── */
        .label-ink {
            font-size: 0.66rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--paper-muted);
            margin-bottom: 0.5rem;
            font-family: var(--font-body);
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
        }
        .label-ink::after {
            content: '';
            width: 1.5rem;
            height: 1px;
            background: var(--ink-border-active);
            flex-shrink: 0;
        }

        /* ── 加载动画 ── */
        .loading-ink {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .loading-ink span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--cinnabar);
            animation: breathe 1.5s ease-in-out infinite;
        }
        .loading-ink span:nth-child(2) { animation-delay: 0.16s; }
        .loading-ink span:nth-child(3) { animation-delay: 0.32s; }

        /* ── 返回链接 ── */
        .back-ink {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--paper-muted);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 2rem 0 1rem;
            transition: all 0.22s ease;
            font-family: var(--font-body);
        }
        .back-ink:hover { color: var(--paper-white); gap: 0.6rem; }
        .back-ink svg { transition: transform 0.22s ease; }
        .back-ink:hover svg { transform: translateX(-3px); }

        /* ── 文章排版 ── */
        .article-title {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.35;
            letter-spacing: -0.01em;
            color: var(--paper-white);
            font-family: var(--font-display);
        }
        .article-body {
            color: var(--paper-secondary);
            line-height: 2;
            font-size: 0.95rem;
            white-space: pre-wrap;
            letter-spacing: 0.015em;
            font-family: var(--font-display);
        }
        .article-body p { margin: 0.5rem 0; }
        .article-body strong { color: var(--paper-white); font-weight: 600; }

        /* ── 配图卡片 ── */
        .image-card-ink {
            display: flex;
            align-items: flex-start;
            gap: 0.9rem;
            padding: 1rem 1.2rem;
            margin: 1rem 0;
            background: linear-gradient(135deg, rgba(158,154,147,0.05), rgba(158,154,147,0.02));
            border: 1px dashed var(--ink-border-active);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            transition: border-color 0.2s;
        }
        .image-card-ink:hover { border-color: var(--cinnabar); border-style: solid; }
        .image-card-ink-icon { font-size: 1.4rem; flex-shrink: 0; line-height: 1; }
        .image-card-ink-desc { color: var(--paper-muted); font-size: 0.82rem; line-height: 1.55; }
        .image-card-ink-desc::before {
            content: "配图建议：";
            display: block;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--paper-secondary);
            margin-bottom: 0.25rem;
        }

        /* ── 导航栏 ── */
        .nav-ink {
            position: relative;
            z-index: 10;
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: var(--font-body);
        }
        .nav-ink-brand {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            color: var(--cinnabar);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .nav-ink-brand::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--cinnabar);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cinnabar-glow);
        }
        .nav-ink-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-credits {
            font-size: 0.78rem;
            color: var(--paper-secondary);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.03em;
        }
        .nav-credits strong {
            color: var(--paper-white);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .nav-credits.credits-low strong { color: var(--cinnabar); }
        .nav-topup {
            font-size: 0.74rem;
            color: var(--gold);
            text-decoration: none;
            border: 1px solid rgba(196,164,90,0.25);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            transition: all 0.2s;
            font-family: var(--font-body);
        }
        .nav-topup:hover { background: rgba(196,164,90,0.08); border-color: var(--gold); }

        /* ── 统计行 ── */
        .stats-row-ink {
            display: flex;
            gap: 1.2rem;
            font-size: 0.72rem;
            color: var(--paper-muted);
            font-family: var(--font-body);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.04em;
            flex-wrap: wrap;
        }

        /* ── 热搜表格 ── */
        .trending-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.83rem;
            font-family: var(--font-body);
        }
        .trending-table thead th {
            text-align: left;
            padding: 0.5rem 0.7rem;
            color: var(--paper-muted);
            font-weight: 600;
            font-size: 0.66rem;
            letter-spacing: 0.1em;
            white-space: nowrap;
            border-bottom: 1px solid var(--ink-border);
            text-transform: uppercase;
        }
        .trending-table tbody td {
            padding: 0.6rem 0.7rem;
            border-bottom: 1px solid var(--ink-border);
            transition: background 0.15s;
        }
        .trending-table tbody tr:hover { background: rgba(255,255,255,0.015); }
        .trending-table tbody tr:last-child td { border-bottom: none; }
        .trending-rank { color: var(--cinnabar); font-weight: 700; font-variant-numeric: tabular-nums; }
        .trending-topic { font-weight: 600; cursor: pointer; transition: color 0.15s; }
        .trending-topic:hover { color: var(--cinnabar); }

        /* ── 响应式 ── */
        @media (min-width: 640px) {
            .container-ink { padding: 0 2rem; }
            .article-title { font-size: 1.8rem; }
            .article-body { font-size: 1rem; }
        }

        /* ── 错误/成功提示 ── */
        .alert-cinnabar {
            padding: 0.9rem 1.1rem;
            border-radius: var(--radius-md);
            background: rgba(212,69,59,0.05);
            border: 1px solid rgba(212,69,59,0.15);
            color: var(--cinnabar);
            font-size: 0.85rem;
            font-family: var(--font-body);
        }
        .alert-jade {
            padding: 0.9rem 1.1rem;
            border-radius: var(--radius-md);
            background: var(--jade-subtle);
            border: 1px solid rgba(107,155,122,0.15);
            color: var(--jade);
            font-size: 0.85rem;
            font-family: var(--font-body);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% if credits is defined %}
    <div class="container-ink">
        <nav class="nav-ink">
            <a href="/" class="nav-ink-brand">墨染</a>
            <div class="nav-ink-right">
                <span class="nav-credits {% if credits == 0 %}credits-low{% endif %}">
                    剩余 <strong>{{ credits }}</strong> 次
                </span>
                <a href="/payment" class="nav-topup">+ 充值</a>
            </div>
        </nav>
    </div>
    {% endif %}
    <div class="container-ink">
        {% block content %}{% endblock %}
    </div>
    <footer style="text-align:center;padding:3rem 1rem 2rem;color:var(--paper-muted);font-size:0.72rem;letter-spacing:0.06em;position:relative;z-index:1;font-family:var(--font-body);">
        <p>墨染 <span style="color:var(--ink-border-active);margin:0 0.5rem;">·</span> AI 小红书创作工坊</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
